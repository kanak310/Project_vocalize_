{% extends "base.html" %}

{% block content %}

<div class="history-container">

    <h1 class="history-title">History</h1>

    <div class="history-grid">

        {% for item in items %}

        <div class="history-card">

            <h3>{{ item.history_type }}</h3>

            <p>{{ item.text }}</p>

        </div>

        {% endfor %}

    </div>

</div>

{% endblock %}
